<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحلل العبقري للصور | OCR المحلي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- مكتبة قص الصور -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <!-- مكتبة Tesseract.js للتعرف على النصوص بدون API Key -->
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #0f172a);
            color: #ffffff;
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hidden-visually { display: none !important; }

        .loading-ring {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #a78bfa;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <header class="text-center my-10">
        <h1 class="text-4xl font-bold text-purple-400 mb-2"> مستخرج النصوص من الصور</h1>
        <p class="text-gray-400">استخراج النصوص من الصور محلياً وبخصوصية تامة </p>
    </header>

    <main class="w-full max-w-3xl glass-panel rounded-3xl p-6 shadow-2xl">
        
        <!-- منطقة الرفع -->
        <div id="uploadSection" class="border-2 border-dashed border-gray-600 rounded-2xl p-12 text-center cursor-pointer hover:border-purple-500 transition">
            <input type="file" id="fileInput" class="hidden" accept="image/*">
            <label for="fileInput" class="cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto mb-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <p class="text-xl font-semibold">اضغط هنا لرفع صورة</p>
                <p class="text-sm text-gray-500 mt-2">سيتم معالجة الصورة داخل جهازك فقط</p>
            </label>
        </div>

        <!-- منطقة المعاينة والقص -->
        <div id="previewSection" class="hidden-visually">
            <div class="max-h-[500px] overflow-hidden rounded-xl mb-6">
                <img id="imagePreview" src="" class="max-w-full">
            </div>
            <div class="flex gap-4 justify-center">
                <button id="analyzeBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-8 py-3 rounded-xl font-bold transition">استخراج النص المحدد</button>
                <button id="resetBtn" class="bg-gray-700 hover:bg-gray-600 px-8 py-3 rounded-xl font-bold transition">إلغاء</button>
            </div>
        </div>

        <!-- حالة التحميل -->
        <div id="loadingSection" class="hidden-visually py-10 flex flex-col items-center">
            <div class="loading-ring mb-4"></div>
            <p id="progressLabel" class="text-purple-300 font-medium animate-pulse">جاري التعرف على الحروف...</p>
        </div>

        <!-- النتائج -->
        <div id="resultSection" class="hidden-visually mt-6 space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-bold text-purple-300">النص المستخرج:</h3>
                <button id="copyBtn" class="text-sm bg-gray-700 px-3 py-1 rounded hover:bg-gray-600 transition">نسخ</button>
            </div>
            <div id="outputText" class="bg-black/40 p-4 rounded-xl border border-white/10 min-h-[100px] text-gray-200 whitespace-pre-wrap leading-relaxed"></div>
            <button id="newBtn" class="w-full py-2 text-gray-500 hover:text-white transition">تحليل صورة أخرى</button>
        </div>

    </main>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadSection = document.getElementById('uploadSection');
        const previewSection = document.getElementById('previewSection');
        const imagePreview = document.getElementById('imagePreview');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const resetBtn = document.getElementById('resetBtn');
        const loadingSection = document.getElementById('loadingSection');
        const progressLabel = document.getElementById('progressLabel');
        const resultSection = document.getElementById('resultSection');
        const outputText = document.getElementById('outputText');
        const copyBtn = document.getElementById('copyBtn');
        const newBtn = document.getElementById('newBtn');

        let cropper = null;

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                imagePreview.src = event.target.result;
                uploadSection.classList.add('hidden-visually');
                previewSection.classList.remove('hidden-visually');

                if (cropper) cropper.destroy();
                cropper = new Cropper(imagePreview, {
                    viewMode: 1,
                    autoCropArea: 1,
                    responsive: true,
                    background: false
                });
            };
            reader.readAsDataURL(file);
        });

        analyzeBtn.addEventListener('click', async () => {
            const canvas = cropper.getCroppedCanvas();
            const croppedImage = canvas.toDataURL('image/png');

            previewSection.classList.add('hidden-visually');
            loadingSection.classList.remove('hidden-visually');
            resultSection.classList.add('hidden-visually');

            try {
                // استخدام Tesseract للتعرف على النص (يدعم العربية والإنجليزية)
                const { data: { text } } = await Tesseract.recognize(
                    croppedImage,
                    'ara+eng', // اللغات المطلوبة
                    { 
                        logger: m => {
                            if (m.status === 'recognizing text') {
                                progressLabel.innerText = `جاري التحليل: ${Math.round(m.progress * 100)}%`;
                            }
                        }
                    }
                );

                loadingSection.classList.add('hidden-visually');
                resultSection.classList.remove('hidden-visually');
                outputText.innerText = text.trim() || "لم يتم العثور على نص في هذا الجزء.";
            } catch (error) {
                alert("حدث خطأ أثناء معالجة الصورة محلياً.");
                console.error(error);
                resetAll();
            }
        });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(outputText.innerText);
            copyBtn.innerText = "تم النسخ!";
            setTimeout(() => copyBtn.innerText = "نسخ", 2000);
        });

        resetBtn.addEventListener('click', resetAll);
        newBtn.addEventListener('click', resetAll);

        function resetAll() {
            if (cropper) cropper.destroy();
            fileInput.value = "";
            uploadSection.classList.remove('hidden-visually');
            previewSection.classList.add('hidden-visually');
            loadingSection.classList.add('hidden-visually');
            resultSection.classList.add('hidden-visually');
        }
    </script>
</body>
</html>
